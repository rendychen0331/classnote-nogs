<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: transparent; }
    #editor {
      padding: 8px;
      outline: none;
      font-family: sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #212121;
      word-break: break-word;
      min-height: 100%;
    }
    table { border-collapse: collapse; width: 100%; margin: 6px 0; }
    td, th { border: 1px solid #bbb; padding: 5px 8px; min-width: 40px; vertical-align: top; }
    ul, ol { padding-left: 24px; margin: 4px 0; }
    b, strong { font-weight: bold; }
    i, em { font-style: italic; }
    u { text-decoration: underline; }
    s { text-decoration: line-through; }
  </style>
</head>
<body>
  <div id="editor" contenteditable="true" spellcheck="false"></div>
  <script>
    var ed = document.getElementById('editor');
    function getContent() { return ed.innerHTML; }
    function setContent(h) { ed.innerHTML = h || ''; }
    function exec(cmd, val) {
      ed.focus();
      document.execCommand(cmd, false, val != null ? val : null);
      notify();
    }
    function insertTable(r, c) {
      ed.focus();
      var h = '<table>';
      for (var i = 0; i < r; i++) {
        h += '<tr>';
        for (var j = 0; j < c; j++) h += '<td> </td>';
        h += '</tr>';
      }
      h += '</table>';
      document.execCommand('insertHTML', false, h);
      notify();
    }
    function notify() {
      try { AndroidBridge.onChanged(getContent()); } catch(e) {}
    }
    ed.addEventListener('input', notify);
  </script>
</body>
</html>
